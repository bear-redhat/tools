---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: investigator
  namespace: investigator
  labels:
    app: investigator

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: investigator-readonly
  labels:
    app: investigator
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: investigator-readonly
  labels:
    app: investigator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: investigator-readonly
subjects:
  - kind: ServiceAccount
    name: investigator
    namespace: investigator

---
apiVersion: v1
kind: Secret
metadata:
  name: investigator-token
  namespace: investigator
  labels:
    app: investigator
  annotations:
    kubernetes.io/service-account.name: investigator
type: kubernetes.io/service-account-token
