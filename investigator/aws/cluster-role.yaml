---
# Reference CredentialsRequest for ccoctl workflows (cluster accounts only).
# Process with: ccoctl aws create-iam-roles --credentials-requests-dir=openshift/
# Do NOT oc apply -- CCO runs in manual mode on STS clusters.
#
# Use this OR aws/cluster-role.cf per account, never both -- they create
# the same IAM role named "investigator" and would conflict.
#
# The app auto-discovers cluster AWS account IDs from existing CCO secrets
# (openshift-machine-api/aws-cloud-credentials) and constructs the role ARN
# by convention. The secretRef below is for ccoctl compatibility but the app
# does not depend on it.
apiVersion: cloudcredential.openshift.io/v1
kind: CredentialsRequest
metadata:
  name: investigator-aws
  namespace: openshift-cloud-credential-operator
spec:
  providerSpec:
    apiVersion: cloudcredential.openshift.io/v1
    kind: AWSProviderSpec
    statementEntries:
      - effect: Allow
        action:
          - "ec2:Describe*"
          - "ec2:Get*"
          - "ec2:List*"
          - "ec2:Search*"
          - "elasticloadbalancing:Describe*"
          - "autoscaling:Describe*"
          - "s3:GetBucket*"
          - "s3:GetObject*"
          - "s3:GetLifecycle*"
          - "s3:GetEncryption*"
          - "s3:ListBucket"
          - "s3:ListAllMyBuckets"
          - "s3:HeadBucket"
          - "s3:HeadObject"
          - "ebs:Get*"
          - "ebs:List*"
          - "efs:Describe*"
          - "route53:Get*"
          - "route53:List*"
          - "acm:Describe*"
          - "acm:Get*"
          - "acm:List*"
          - "iam:Get*"
          - "iam:List*"
          - "sts:GetCallerIdentity"
          - "sts:GetAccessKeyInfo"
          - "cloudwatch:Describe*"
          - "cloudwatch:Get*"
          - "cloudwatch:List*"
          - "logs:Describe*"
          - "logs:Get*"
          - "logs:Filter*"
          - "logs:List*"
          - "logs:StartQuery"
          - "logs:StopQuery"
          - "logs:GetQueryResults"
          - "kms:Describe*"
          - "kms:Get*"
          - "kms:List*"
          - "cloudformation:Describe*"
          - "cloudformation:Get*"
          - "cloudformation:List*"
          - "cloudtrail:Describe*"
          - "cloudtrail:Get*"
          - "cloudtrail:List*"
          - "cloudtrail:LookupEvents"
          - "sns:Get*"
          - "sns:List*"
          - "sqs:Get*"
          - "sqs:List*"
          - "servicequotas:Get*"
          - "servicequotas:List*"
          - "tag:Get*"
          - "resource-groups:Get*"
          - "resource-groups:List*"
          - "resource-groups:Search*"
        resource: "*"
  secretRef:
    name: investigator-aws-credentials
    namespace: investigator
  serviceAccountNames:
    - investigator
