name: Vertex AI Proxy - Build

on:
  push:
    branches: [master]
    paths: [vertex-ai-proxy/**]
  workflow_dispatch:

env:
  IMAGE_NAME: vertex-ai-proxy

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.proxy == 'true' }}
      source: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.source == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            proxy:
              - 'vertex-ai-proxy/**'
            source:
              - 'vertex-ai-proxy/**/*.cs'
              - 'vertex-ai-proxy/**/*.csproj'
              - 'vertex-ai-proxy/Dockerfile'

  build:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    defaults:
      run:
        working-directory: vertex-ai-proxy
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: vertex-ai-proxy
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            artifact: vertex-ai-proxy
          - os: windows-latest
            rid: win-x64
            artifact: vertex-ai-proxy.exe
          - os: windows-latest
            rid: win-arm64
            artifact: vertex-ai-proxy.exe

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install native AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish
        run: >
          dotnet publish -c Release
          -r ${{ matrix.rid }}
          -o publish

      - uses: actions/upload-artifact@v4
        with:
          name: vertex-ai-proxy-${{ matrix.rid }}
          path: vertex-ai-proxy/publish/${{ matrix.artifact }}

  container:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: vertex-ai-proxy

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYY-MM-DD'}},enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: vertex-ai-proxy
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

  release:
    needs: [changes, build]
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          mkdir release
          cp artifacts/vertex-ai-proxy-linux-x64/vertex-ai-proxy   "release/vertex-ai-proxy-linux-x64"
          cp artifacts/vertex-ai-proxy-linux-arm64/vertex-ai-proxy  "release/vertex-ai-proxy-linux-arm64"
          cp artifacts/vertex-ai-proxy-win-x64/vertex-ai-proxy.exe  "release/vertex-ai-proxy-win-x64.exe"
          cp artifacts/vertex-ai-proxy-win-arm64/vertex-ai-proxy.exe "release/vertex-ai-proxy-win-arm64.exe"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: vertex-ai-proxy/${{ github.sha }}
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          DATE=$(date -u +%Y-%m-%d)
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "vertex-ai-proxy ${DATE} (${SHORT_SHA})" \
            --generate-notes \
            release/*
