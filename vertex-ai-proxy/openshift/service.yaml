apiVersion: v1
kind: Service
metadata:
  name: vertex-ai-proxy
  namespace: vertex-ai-proxy
  labels:
    app.kubernetes.io/name: vertex-ai-proxy
    app.kubernetes.io/component: proxy
spec:
  selector:
    app.kubernetes.io/name: vertex-ai-proxy
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
