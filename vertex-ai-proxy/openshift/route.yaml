apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: vertex-ai-proxy
  namespace: vertex-ai-proxy
  labels:
    app.kubernetes.io/name: vertex-ai-proxy
    app.kubernetes.io/component: proxy
spec:
  to:
    kind: Service
    name: vertex-ai-proxy
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
